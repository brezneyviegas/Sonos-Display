<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sonos Display</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    height: 100%;
    overflow: hidden;
    background: #000;
    color: #fff;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    user-select: none;
    -webkit-user-select: none;
  }

  #bg {
    position: fixed;
    inset: -40px;
    background-size: cover;
    background-position: center;
    filter: blur(40px) brightness(0.35);
    transition: background-image 0.6s ease;
  }

  #content {
    position: relative;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 24px;
    padding: 24px;
    text-align: center;
  }

  #art-wrap {
    position: relative;
    width: min(55vh, 80vw);
    height: min(55vh, 80vw);
    perspective: 1600px;
  }

  /* the flipping card holding cover (front) and record (back) */
  #flipper {
    position: absolute;
    inset: 0;
    transform-style: preserve-3d;
    transition: transform 0.8s cubic-bezier(.4,.05,.2,1);
  }
  #art-wrap.playing #flipper { transform: rotateY(180deg); }

  #art, #vinyl {
    position: absolute;
    inset: 0;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
  }

  #vinyl {
    border-radius: 50%;
    /* face the back of the card so it shows after the flip */
    transform: rotateY(180deg);
    background:
      radial-gradient(circle at 50% 50%, #000 0 1.5%, transparent 1.5%),
      repeating-radial-gradient(circle at 50% 50%, #232323 0 1px, #0c0c0c 1px 5px),
      #111;
    box-shadow: 0 20px 60px rgba(0,0,0,0.7);
    rotate: 0deg;
    animation: spin 6s linear infinite;
    animation-play-state: paused;
  }
  #art-wrap.playing #vinyl { animation-play-state: running; }

  /* center label = album art */
  #vinyl::after {
    content: "";
    position: absolute;
    inset: 31%;
    border-radius: 50%;
    background: #333 center/cover no-repeat;
    background-image: var(--label, none);
    box-shadow: 0 0 0 2px rgba(0,0,0,0.4), inset 0 0 0 3px rgba(255,255,255,0.06);
  }

  /* spindle hole */
  #vinyl::before {
    content: "";
    position: absolute;
    top: 50%; left: 50%;
    width: 3%; height: 3%;
    transform: translate(-50%, -50%);
    border-radius: 50%;
    background: #000;
    box-shadow: 0 0 0 2px rgba(255,255,255,0.08);
    z-index: 2;
  }

  @keyframes spin {
    to { rotate: -360deg; }
  }

  #art {
    width: 100%;
    height: 100%;
    border-radius: 12px;
    background: #222 center/cover no-repeat;
    box-shadow: 0 20px 60px rgba(0,0,0,0.6);
  }

  #title  { font-size: clamp(24px, 4.5vw, 48px); font-weight: 700; }
  #artist { font-size: clamp(16px, 3vw, 30px); opacity: 0.8; }
  #room {
    position: fixed;
    top: 16px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 14px;
    opacity: 0.5;
    letter-spacing: 2px;
    text-transform: uppercase;
    z-index: 30;
    cursor: pointer;
    padding: 8px 16px;
    border-radius: 16px;
    transition: opacity 0.15s ease, background 0.15s ease;
  }
  #room:hover { opacity: 1; background: rgba(255,255,255,0.15); }

  #picker {
    position: fixed;
    inset: 0;
    z-index: 40;
    display: none;
    align-items: center;
    justify-content: center;
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(8px);
  }
  #picker.open { display: flex; }
  #picker-panel {
    background: rgba(30,30,30,0.95);
    border-radius: 16px;
    padding: 16px 0;
    min-width: 280px;
    max-width: 90vw;
    max-height: 70vh;
    overflow-y: auto;
    box-shadow: 0 20px 60px rgba(0,0,0,0.8);
  }
  #picker-panel h2 {
    font-size: 13px;
    letter-spacing: 2px;
    text-transform: uppercase;
    opacity: 0.5;
    text-align: center;
    padding: 4px 24px 12px;
    font-weight: 600;
  }
  .speaker {
    padding: 14px 24px;
    font-size: 18px;
    cursor: pointer;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 16px;
  }
  .speaker:hover { background: rgba(255,255,255,0.1); }
  .speaker.current { color: #4da6ff; }
  .speaker .grouped { font-size: 13px; opacity: 0.5; }
  .speaker .check { font-size: 16px; }

  #progress {
    position: fixed;
    bottom: 0;
    left: 0;
    height: 4px;
    background: #fff;
    opacity: 0.7;
    width: 0%;
    transition: width 1s linear;
  }

  #status {
    position: fixed;
    bottom: 20px;
    left: 0;
    right: 0;
    font-size: 14px;
    opacity: 0.5;
  }

  /* Click zones */
  .zone {
    position: fixed;
    top: 0;
    bottom: 0;
    width: 35%;
    z-index: 10;
    display: flex;
    align-items: center;
    cursor: pointer;
  }
  #zone-prev { left: 0; justify-content: flex-start; }
  #zone-next { right: 0; justify-content: flex-end; }
  #zone-play { left: 35%; width: 30%; }

  .zone .arrow {
    font-size: 64px;
    opacity: 0;
    padding: 0 24px;
    transition: opacity 0.15s ease;
  }
  .zone:hover .arrow { opacity: 0.4; }
  .zone:active .arrow { opacity: 0.9; }

  .flash { animation: flash 0.25s ease; }
  @keyframes flash {
    0% { opacity: 0.9; }
    100% { opacity: 0; }
  }

  #volume-overlay {
    position: fixed;
    top: 50%;
    right: 28px;
    transform: translateY(-50%);
    width: 8px;
    height: 40vh;
    border-radius: 4px;
    background: rgba(255,255,255,0.2);
    opacity: 0;
    transition: opacity 0.25s ease;
    z-index: 20;
    pointer-events: none;
  }
  #volume-overlay.visible { opacity: 1; }
  #volume-fill {
    position: absolute;
    bottom: 0;
    width: 100%;
    border-radius: 4px;
    background: #fff;
    height: 0%;
  }
  #volume-label {
    position: absolute;
    bottom: -34px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 16px;
    font-weight: 600;
  }
</style>
</head>
<body>
  <div id="bg"></div>
  <div id="content">
    <div id="room"></div>
    <div id="art-wrap">
      <div id="flipper">
        <div id="art"></div>
        <div id="vinyl"></div>
      </div>
    </div>
    <div id="title">Connecting to Sonos…</div>
    <div id="artist"></div>
  </div>
  <div id="zone-prev" class="zone"><span class="arrow">&#10094;</span></div>
  <div id="zone-play" class="zone"></div>
  <div id="zone-next" class="zone"><span class="arrow">&#10095;</span></div>
  <div id="progress"></div>
  <div id="status"></div>
  <div id="volume-overlay">
    <div id="volume-fill"></div>
    <div id="volume-label"></div>
  </div>
  <div id="picker">
    <div id="picker-panel">
      <h2>Speakers</h2>
      <div id="picker-list"></div>
    </div>
  </div>

<script>
  const $ = id => document.getElementById(id);
  let currentArt = '';

  async function refresh() {
    try {
      const res = await fetch('/api/state');
      if (!res.ok) throw new Error((await res.json()).error || res.statusText);
      const s = await res.json();

      $('room').textContent = s.room || '';
      $('title').textContent = s.title || (s.playing ? 'Unknown track' : 'Nothing playing');
      $('artist').textContent = [s.artist, s.album].filter(Boolean).join(' — ');
      $('status').textContent = s.playing ? '' : 'Paused — tap center to play';

      if (s.albumArt && s.albumArt !== currentArt) {
        currentArt = s.albumArt;
        $('art').style.backgroundImage = `url("${s.albumArt}")`;
        $('bg').style.backgroundImage = `url("${s.albumArt}")`;
        $('vinyl').style.setProperty('--label', `url("${s.albumArt}")`);
      } else if (!s.albumArt && currentArt) {
        currentArt = '';
        $('art').style.backgroundImage = '';
        $('bg').style.backgroundImage = '';
        $('vinyl').style.removeProperty('--label');
      }

      $('art-wrap').classList.toggle('playing', !!s.playing);

      const pct = s.duration > 0 ? (s.position / s.duration) * 100 : 0;
      $('progress').style.width = pct + '%';
    } catch (err) {
      $('title').textContent = 'No Sonos found';
      $('artist').textContent = err.message;
      $('status').textContent = 'Retrying…';
    }
  }

  async function action(name, zoneId) {
    const arrow = document.querySelector(`#${zoneId} .arrow`);
    if (arrow) {
      arrow.classList.remove('flash');
      void arrow.offsetWidth;
      arrow.classList.add('flash');
    }
    try {
      await fetch('/api/' + name, { method: 'POST' });
    } catch (e) { /* state refresh will show error */ }
    setTimeout(refresh, 400);
  }

  $('zone-prev').addEventListener('click', () => action('previous', 'zone-prev'));
  $('zone-next').addEventListener('click', () => action('next', 'zone-next'));
  $('zone-play').addEventListener('click', () => action('playpause', 'zone-play'));

  document.addEventListener('keydown', e => {
    if (e.key === 'ArrowLeft') action('previous', 'zone-prev');
    if (e.key === 'ArrowRight') action('next', 'zone-next');
    if (e.key === ' ') { e.preventDefault(); action('playpause', 'zone-play'); }
  });

  // --- Speaker picker ---
  async function openPicker() {
    const list = $('picker-list');
    list.innerHTML = '<div class="speaker">Loading…</div>';
    $('picker').classList.add('open');
    try {
      const res = await fetch('/api/speakers');
      const { current, speakers } = await res.json();
      list.innerHTML = '';
      for (const s of speakers) {
        const el = document.createElement('div');
        el.className = 'speaker' + (s.host === current ? ' current' : '');
        const grouped = s.group.length > 1
          ? `<span class="grouped">+ ${s.group.filter(r => r !== s.room).join(', ')}</span>` : '';
        el.innerHTML = `<span>${s.room} ${grouped}</span>` +
          (s.host === current ? '<span class="check">&#10003;</span>' : '');
        el.addEventListener('click', async e => {
          e.stopPropagation();
          await fetch('/api/speaker', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ host: s.host }),
          });
          $('picker').classList.remove('open');
          currentArt = '';
          volume = null;
          fetch('/api/volume').then(r => r.json()).then(v => { volume = v.volume; }).catch(() => {});
          refresh();
        });
        list.appendChild(el);
      }
    } catch (err) {
      list.innerHTML = `<div class="speaker">Failed: ${err.message}</div>`;
    }
  }

  $('room').addEventListener('click', e => { e.stopPropagation(); openPicker(); });
  $('picker').addEventListener('click', e => {
    if (e.target === $('picker')) $('picker').classList.remove('open');
  });
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') $('picker').classList.remove('open');
  });

  // --- Volume: two-finger swipe up = louder, down = quieter ---
  let volume = null;
  let pendingDelta = 0;
  let flushTimer = null;
  let hideTimer = null;

  fetch('/api/volume').then(r => r.json()).then(v => { volume = v.volume; }).catch(() => {});

  function showVolume(v) {
    $('volume-fill').style.height = v + '%';
    $('volume-label').textContent = v;
    $('volume-overlay').classList.add('visible');
    clearTimeout(hideTimer);
    hideTimer = setTimeout(() => $('volume-overlay').classList.remove('visible'), 1200);
  }

  function adjustVolume(steps) {
    if (volume === null || steps === 0) return;
    volume = Math.max(0, Math.min(100, volume + steps));
    showVolume(volume);
    pendingDelta += steps;
    if (!flushTimer) {
      flushTimer = setTimeout(async () => {
        const delta = pendingDelta;
        pendingDelta = 0;
        flushTimer = null;
        try {
          const res = await fetch('/api/volume/adjust', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ delta }),
          });
          const v = await res.json();
          if (typeof v.volume === 'number' && pendingDelta === 0) {
            volume = v.volume;
            showVolume(volume);
          }
        } catch (e) { /* next adjust resyncs */ }
      }, 200);
    }
  }

  // Trackpad two-finger swipe arrives as wheel events. With natural
  // scrolling (macOS default) fingers-up gives positive deltaY.
  let wheelAccum = 0;
  document.addEventListener('wheel', e => {
    e.preventDefault();
    wheelAccum += e.deltaY;
    const steps = Math.trunc(wheelAccum / 25);
    if (steps !== 0) {
      wheelAccum -= steps * 25;
      adjustVolume(steps);
    }
  }, { passive: false });

  // Touchscreen: two-finger vertical drag
  let touchY = null;
  document.addEventListener('touchstart', e => {
    if (e.touches.length === 2) {
      touchY = (e.touches[0].clientY + e.touches[1].clientY) / 2;
    }
  });
  document.addEventListener('touchmove', e => {
    if (e.touches.length !== 2 || touchY === null) return;
    e.preventDefault();
    const y = (e.touches[0].clientY + e.touches[1].clientY) / 2;
    const steps = Math.trunc((touchY - y) / 8); // fingers up = louder
    if (steps !== 0) {
      touchY = y;
      adjustVolume(steps);
    }
  }, { passive: false });
  document.addEventListener('touchend', e => {
    if (e.touches.length < 2) touchY = null;
  });

  refresh();
  setInterval(refresh, 2000);
</script>
</body>
</html>
